<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0b0b0d" />
    <meta name="description" content="DataSentinel AI — autonomous multi-agent Data Quality & Governance for the modern enterprise." />
    <title>DQ Sentinel</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600;9..144,700&family=Manrope:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />

    <!-- Flash-free theme bootstrap (runs before React) -->
     <script>
      (function () {
        try {
          var stored = localStorage.getItem('datasentinel.theme');
          var preferDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          var theme = stored || 'dark'; // default to dark for this brand
          if (theme === 'system') theme = preferDark ? 'dark' : 'light';
          var root = document.documentElement;
          root.classList.remove('light', 'dark');
          root.classList.add(theme);
          root.style.colorScheme = theme;
        } catch (e) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
